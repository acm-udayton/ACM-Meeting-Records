    name: Pylint CI

    on:
      push:
      pull_request:
      
    jobs:
      lint:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4
          
          - name: Install uv
            uses: astral-sh/setup-uv@v5

          - name: Set up Python
            run: uv python install 3.11

          - name: Sync dependencies
            run: uv sync

          - name: Run Pylint
            run: uv run pylint --rcfile=.github/workflows/.pylintrc app/